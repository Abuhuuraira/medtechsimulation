<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | MedTech Simulation</title>
  <link rel="icon" type="image/png" href="../static_files/images/favicon.png">
  <link rel="stylesheet" href="/css/manikin_golobal.css">
  <link rel="stylesheet" href="/css/about_contact.css">
</head>

<body class="about-contact-page contact-simple-page">
  <div id="navbar-placeholder"></div>

  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-blur-box">
        <h1>CONTACT US<span></span></h1>
        <p class="hero-subtext">Simple communication. Fast response. Professional support.</p>
      </div>
    </div>
    <button class="chat-btn">ðŸ’¬ Chat With Us!</button>
  </section>

  <section class="contact-simple-wrap">
    <div class="contact-simple-grid">
      <aside class="contact-simple-info">
        <div class="contact-tag">Get In Touch</div>
        <h2>Letâ€™s Talk</h2>
        <p>Need product support, pricing, or training guidance? Send your details and our team will reach out shortly.</p>

        <div class="simple-info-list">
          <div><span>Email</span><a href="mailto:info@medtechsimulation.com">info@medtechsimulation.com</a></div>
          <div><span>Phone</span><a href="tel:+10000000000">+1 (000) 000-0000</a></div>
          <div><span>Hours</span><p>Mon - Fri, 9:00 AM - 6:00 PM</p></div>
        </div>
      </aside>

      <form class="contact-simple-form">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="How can we help you?" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script>
    fetch("../navbar.html")
      .then(response => {
        if (!response.ok) throw new Error("Navbar file not found");
        return response.text();
      })
      .then(data => {
        document.getElementById("navbar-placeholder").innerHTML = data;
      })
      .catch(error => {
        console.error("Error loading navbar:", error);
      });
  </script>

  <script>
    fetch("../footer.html")
      .then(response => {
        if (!response.ok) throw new Error("Footer file not found");
        return response.text();
      })
      .then(data => {
        document.getElementById("footer-placeholder").innerHTML = data;
      })
      .catch(error => {
        console.error("Error loading footer:", error);
      });
  </script>

<script src="/js/navbar.js"></script>
</body>
</html>
