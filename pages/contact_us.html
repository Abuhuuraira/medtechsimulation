<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | MedTech Simulation</title>
  <link rel="icon" type="image/png" href="../static_files/images/favicon.png">
  <link rel="stylesheet" href="/css/manikin_golobal.css">
  <link rel="stylesheet" href="/css/about_contact.css">
</head>

<body class="about-contact-page contact-simple-page">
  <div id="navbar-placeholder"></div>

  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-blur-box">
        <h1>CONTACT US<span></span></h1>
        <p class="hero-subtext">Simple communication. Fast response. Professional support.</p>
      </div>
    </div>
    <button class="chat-btn"> Chat With Us!</button>
  </section>

  <section class="contact-simple-wrap reveal-on-scroll" data-reveal="left" style="--reveal-delay: 70ms;">
    <div class="contact-simple-grid">
      <aside class="contact-simple-info reveal-on-scroll" style="--reveal-delay: 130ms;">
        <div class="contact-tag">Get In Touch</div>
        <h2>Let's Talk</h2>
        <p>Need product support, pricing, or training guidance? Send your details and our team will reach out shortly.</p>

        <div class="simple-info-list">
          <div class="reveal-on-scroll" style="--reveal-delay: 180ms;"><span>Email</span><a href="mailto:info@medtechsimulation.com">info@medtechsimulation.com</a></div>
          <div class="reveal-on-scroll" style="--reveal-delay: 230ms;"><span>Phone</span><a href="tel:+10000000000">+1 (000) 000-0000</a></div>
          <div class="reveal-on-scroll" style="--reveal-delay: 280ms;"><span>Hours</span><p>Mon - Fri, 9:00 AM - 6:00 PM</p></div>
        </div>
      </aside>

      <form id="contact-form" class="contact-simple-form reveal-on-scroll" data-reveal="right" style="--reveal-delay: 150ms;" method="POST" action="../api/contact.php">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="text" name="website" style="display:none" tabindex="-1" autocomplete="off">
        <textarea name="message" placeholder="How can we help you?" required></textarea>
        <button type="submit">Send Message</button>
        <p id="form-status" role="status" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script>
    fetch("../navbar.html")
      .then(response => {
        if (!response.ok) throw new Error("Navbar file not found");
        return response.text();
      })
      .then(data => {
        document.getElementById("navbar-placeholder").innerHTML = data;
      })
      .catch(error => {
        console.error("Error loading navbar:", error);
      });
  </script>

  <script>
    fetch("../footer.html")
      .then(response => {
        if (!response.ok) throw new Error("Footer file not found");
        return response.text();
      })
      .then(data => {
        document.getElementById("footer-placeholder").innerHTML = data;
      })
      .catch(error => {
        console.error("Error loading footer:", error);
      });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const revealElements = document.querySelectorAll(".about-contact-page .reveal-on-scroll");

      if (!("IntersectionObserver" in window)) {
        revealElements.forEach((element) => element.classList.add("is-visible"));
        return;
      }

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          entry.target.classList.add("is-visible");
          obs.unobserve(entry.target);
        });
      }, {
        threshold: 0.18,
        rootMargin: "0px 0px -8% 0px"
      });

      revealElements.forEach((element) => observer.observe(element));
    });
  </script>

<script src="/js/navbar.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");
    if (!form || !status) return;

    const submitButton = form.querySelector("button[type='submit']");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.textContent = "Sending your message...";

      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = "Sending...";
      }

      try {
        if (window.location.protocol === "file:") {
          throw new Error("Please run the site on localhost or live hosting. PHP form submission does not work from file://.");
        }

        const formData = new FormData(form);
        const configuredEndpoint = form.getAttribute("action") || "../api/contact.php";

        const configuredUrl = new URL(configuredEndpoint, window.location.href);
        const relativeUrl = new URL("../api/contact.php", window.location.href);
        const rootUrl = new URL("/api/contact.php", window.location.origin);

        const currentPath = window.location.pathname;
        const fromPagesPath = currentPath.replace(/\/pages\/[^/]+\/?$/, "/api/contact.php");
        const pagesUrl = fromPagesPath !== currentPath
          ? new URL(fromPagesPath, window.location.origin)
          : null;

        const endpoints = Array.from(new Set([
          configuredUrl.href,
          pagesUrl ? pagesUrl.href : "",
          relativeUrl.href,
          rootUrl.href
        ].filter(Boolean)));

        let response = null;
        let result = null;
        let lastError = null;
        let lastFailureDetails = "";

        for (const endpoint of endpoints) {
          try {
            response = await fetch(endpoint, {
              method: "POST",
              headers: {
                "Accept": "application/json"
              },
              body: formData
            });

            const rawResponse = await response.text();
            const contentType = (response.headers.get("content-type") || "").toLowerCase();
            const isJsonHeader = contentType.includes("application/json");

            if (response.status === 405 && !isJsonHeader) {
              throw new Error("PHP is not executing on this local server (likely static Live Server on port 5500). Run with a PHP server: php -S 127.0.0.1:8000, then open http://127.0.0.1:8000/pages/contact_us.html");
            }

            if (rawResponse) {
              try {
                result = JSON.parse(rawResponse);
              } catch (parseError) {
                if (!isJsonHeader) {
                  const preview = rawResponse.replace(/\s+/g, " ").trim().slice(0, 120);
                  throw new Error(`Endpoint ${endpoint} returned non-JSON response (${response.status}). ${preview || "No response body."}`);
                }

                throw new Error("Server returned invalid JSON. Please contact support.");
              }
            } else {
              result = null;
            }

            if (!isJsonHeader && result === null) {
              throw new Error(`Endpoint ${endpoint} did not return JSON (${response.status}).`);
            }

            if (!response.ok || !result || !result.success) {
              throw new Error((result && result.message) || "Unable to submit the form right now.");
            }

            lastError = null;
            break;
          } catch (endpointError) {
            lastError = endpointError;
            lastFailureDetails = `Tried: ${endpoint}${response ? ` (HTTP ${response.status})` : ""}`;
            response = null;
            result = null;
          }
        }

        if (lastError) {
          const baseMessage = (lastError && lastError.message) ? lastError.message : "Unable to submit the form right now.";
          throw new Error(`${baseMessage} ${lastFailureDetails}`.trim());
        }

        status.textContent = "Thank you. Your message was sent successfully.";
        form.reset();
      } catch (error) {
        status.textContent = error.message || "Something went wrong. Please try again.";
      } finally {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = "Send Message";
        }
      }
    });
  });
</script>
</body>
</html>
