  <style>
    /* NAVBAR */
.navbar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 100%;
  height: 70px;          /* FIXED NAVBAR HEIGHT */
  padding: 0 60px;       /* remove vertical padding */
  box-sizing: border-box;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgb(31, 31, 31);
  z-index: 10;
  overflow-x: clip;
  animation: navDrop 420ms cubic-bezier(.2,.8,.2,1);
}

@keyframes navDrop {
  from {
    opacity: 0;
    transform: translateY(-14px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.nav-left {
  display: flex;
  align-items: center;
}

.nav-left nav {
  margin-left: clamp(24px, 7vw, 180px);
  display: flex;
  align-items: flex-end; /* 👈 push links to bottom */
  height: 100%;
  margin-top: 20px;
}


.logo {
  height: 100%;
  display: flex;
  align-items: center;
}

.logo img {
  max-height: 100px;   /* 👈 adjust freely */
  width: auto;
  transition: transform 260ms ease, filter 260ms ease;
}

.logo img:hover {
  transform: translateY(-1px) scale(1.03);
  filter: brightness(1.05);
}

.navbar nav a {
  position: relative;
  color: #fff;
  text-decoration: none;
  margin-left: clamp(12px, 2.2vw, 28px);
  font-size: 14px;
  text-transform: uppercase;
   padding-bottom: 20px;  /* 👈 move closer to bottom */
  line-height: 1;
  transition: color 220ms ease;
}

.navbar nav a::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 12px;
  height: 2px;
  background: rgba(255, 255, 255, 0.9);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 240ms ease;
}

.navbar nav a:hover::after {
  transform: scaleX(1);
}
/* HAMBURGER ICON */
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
  gap: 3px;
  padding: 7px;
  align-items: center;
  background: transparent;
  border: none;
}

.hamburger:focus {
  outline: none;
  box-shadow: 0 0 0 3px rgba(31, 123, 255, 0.15);
  border-radius: 6px;
}

.hamburger span {
  width: 26px;
  height: 3px;
  background: #fff;
  border-radius: 2px;
  transition: transform 300ms ease, opacity 240ms ease;
}

.hamburger.active span:nth-child(1) {
  transform: translateY(6px) rotate(45deg);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
  transform: scaleX(0);
}
.hamburger.active span:nth-child(3) {
  transform: translateY(-6px) rotate(-45deg);
}

/* TABLET & MOBILE MENU */
@media (max-width: 992px) {

  .navbar {
    position: relative;
    padding: 0 16px;
    height: 70px;
  }

  .nav-left nav {
    margin-left: 0;
    margin-top: 0;
  }

  .logo img {
    height: 170px;
  }

  /* show hamburger */
  .hamburger {
    display: flex;
  }

  /* transform nav into collapsible panel */
  .navbar nav {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: rgb(31, 31, 31);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
    max-height: 0;
    transition: max-height 320ms ease, padding 220ms ease, transform 260ms ease, opacity 220ms ease;
    z-index: 100;
    transform-origin: top center;
  }

  .navbar nav a {
    margin: 0;
            padding: 14px 337px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 15px;
  }

  /* when menu is open */
  .navbar nav.active {
            padding: 28px 0 182px;
    max-height: 800px; /* large enough for menu, allows transition */
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
  }

  /* Open animations: panel slide + item stagger */
  .navbar nav {
    transform: translateY(-6px);
    opacity: 0;
    transition: max-height 320ms cubic-bezier(.2,.8,.2,1), transform 300ms ease, opacity 220ms ease;
  }

  .navbar nav.active {
    transform: translateY(0);
    opacity: 1;
  }

  .navbar nav a {
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 260ms ease, transform 260ms ease, background-color 200ms ease;
  }

  .navbar nav a::after {
    display: none;
  }

  .navbar nav a:hover {
    background: rgba(255,255,255,0.06);
  }

  .navbar nav.active a {
    opacity: 1;
    transform: translateY(0);
  }

  /* Staggered delays for up to 8 items */
  .navbar nav.active a:nth-child(1) { transition-delay: 80ms; }
  .navbar nav.active a:nth-child(2) { transition-delay: 140ms; }
  .navbar nav.active a:nth-child(3) { transition-delay: 200ms; }
  .navbar nav.active a:nth-child(4) { transition-delay: 260ms; }
  .navbar nav.active a:nth-child(5) { transition-delay: 320ms; }
  .navbar nav.active a:nth-child(6) { transition-delay: 380ms; }
  .navbar nav.active a:nth-child(7) { transition-delay: 440ms; }
  .navbar nav.active a:nth-child(8) { transition-delay: 500ms; }

  /* Hamburger line animation smoothing */
  .hamburger span { transform-origin: center; }

  /* Respect reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .navbar,
    .logo img,
    .navbar nav,
    .navbar nav a,
    .hamburger span {
      transition: none !important;
      animation: none !important;
    }
  }
}

@media (min-width: 993px) {
  #mobile-nav {
    display: flex !important;
    max-height: none !important;
    opacity: 1 !important;
    transform: none !important;
    position: static !important;
    background: transparent !important;
    overflow: visible !important;
  }

  #mobile-nav a {
    border-top: none !important;
  }
}
  </style>

  <script>
  const hamburger = document.getElementById("hamburger");
  const mobileNav = document.getElementById("mobile-nav");

  function closeMenu() {
    mobileNav.classList.remove('active');
    mobileNav.setAttribute('aria-hidden', 'true');
    hamburger.classList.remove('active');
    hamburger.setAttribute('aria-expanded', 'false');
  }

  hamburger.addEventListener("click", () => {
    const isActive = mobileNav.classList.toggle("active");
    hamburger.classList.toggle("active", isActive);
    hamburger.setAttribute('aria-expanded', isActive ? 'true' : 'false');
    mobileNav.setAttribute('aria-hidden', isActive ? 'false' : 'true');
  });

  mobileNav.querySelectorAll('a').forEach((link) => {
    link.addEventListener('click', () => {
      if (window.innerWidth <= 992) closeMenu();
    });
  });

  document.addEventListener('click', (e) => {
    const withinNav = e.target.closest('.navbar');
    if (!withinNav && mobileNav.classList.contains('active')) {
      closeMenu();
    }
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth > 992) {
      mobileNav.classList.remove('active');
      mobileNav.setAttribute('aria-hidden', 'false');
      hamburger.classList.remove('active');
      hamburger.setAttribute('aria-expanded', 'false');
    } else {
      mobileNav.setAttribute('aria-hidden', mobileNav.classList.contains('active') ? 'false' : 'true');
    }
  });
</script>
